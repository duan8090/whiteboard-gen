<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✍️ AI 视觉笔记生成器</title>
  <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root { --primary: #00B16A; --text: #111; --bg: #f0f2f5; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); padding: 30px 20px; display: flex; flex-direction: column; align-items: center; color: var(--text); }
    h1 { font-size: 1.8rem; color: #1a1a2e; margin-bottom: 6px; }
    .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 24px; }
    .control-panel { background: white; padding: 24px; border-radius: 14px; width: 100%; max-width: 960px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    .input-group { margin-bottom: 14px; }
    label { display: block; margin-bottom: 5px; font-weight: 700; font-size: 13px; color: #555; }
    textarea { width: 100%; height: 160px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: 'Noto Sans SC', sans-serif; resize: vertical; line-height: 1.7; }
    textarea:focus { border-color: var(--primary); outline: none; }
    .btn-row { display: flex; gap: 10px; margin-top: 14px; }
    button { flex: 1; padding: 13px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
    .btn-gen { background: var(--primary); color: white; }
    .btn-gen:hover { background: #009955; transform: translateY(-1px); }
    .btn-gen:disabled { background: #aaa; cursor: not-allowed; transform: none; }
    .btn-dl { background: #1e293b; color: white; }
    .btn-dl:hover { background: #334155; transform: translateY(-1px); }
    .btn-dl:disabled { background: #aaa; cursor: not-allowed; transform: none; }
    #status { margin-top: 12px; text-align: center; font-size: 14px; color: #e67e22; font-weight: bold; min-height: 20px; }
    #result-preview { max-width: 960px; width: 100%; margin-top: 20px; border-radius: 14px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.15); display: none; }
    #result-preview img { width: 100%; display: block; }
    .tips { max-width: 960px; width: 100%; margin-top: 16px; padding: 14px; background: white; border-radius: 10px; font-size: 0.82rem; color: #888; line-height: 1.7; }
    .tips strong { color: var(--primary); }
    .whiteboard { width: 960px; height: 540px; background-color: #fff; background-image: radial-gradient(#d1d5db 1px, transparent 1.5px); background-size: 25px 25px; border: 10px solid #273746; border-radius: 20px; padding: 50px; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; gap: 20px; position: fixed; top: -9999px; left: -9999px; font-family: 'Zhi Mang Xing', cursive, 'Noto Sans SC', sans-serif; }
    .wb-title { font-size: 52px; margin-bottom: 4px; }
    .wb-subtitle { font-size: 26px; color: var(--primary); display: inline; border-bottom: 3px dashed var(--primary); padding-bottom: 3px; }
    .wb-point { display: flex; align-items: center; margin-bottom: 14px; }
    .wb-point-icon { font-size: 34px; margin-right: 10px; }
    .wb-point-text { font-size: 24px; line-height: 1.3; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <h1>✍️ AI 视觉笔记生成器</h1>
  <p class="subtitle">输入任意文字 → AI 智能解析结构 → 生成白板图片 → 直接下载</p>

  <div class="control-panel">
    <div class="input-group">
      <label>📝 输入你想转换的内容（AI 会自动分析提取核心要点）：</label>
      <textarea id="inputText" placeholder="例如：大家好，欢迎收听本期的节目！今天我们来聊聊如何高效学习。第一点：制定计划，每天坚持。第二点：善用工具，比如番茄钟。第三点：定期复盘，总结经验..."></textarea>
    </div>
    <div class="btn-row">
      <button class="btn-gen" id="genBtn" onclick="processAndGenerate()">⚡ AI 生成白板图</button>
      <button class="btn-dl" id="dlBtn" onclick="downloadImg()" disabled>⬇️ 下载图片</button>
    </div>
    <div id="status"></div>
  </div>

  <div id="result-preview"><img id="preview-img" /></div>

  <!-- 隐藏的白板渲染区 -->
  <div class="whiteboard" id="whiteboard">
    <div style="grid-column:1;grid-row:1;display:flex;flex-direction:column">
      <div class="wb-title" id="wb-title">加载中...</div>
      <div class="wb-subtitle" id="wb-subtitle">—</div>
    </div>
    <div style="grid-column:2;grid-row:1/3;display:flex;align-items:center;justify-content:center">
      <div style="text-align:center">
        <div style="font-size:90px">🛡️</div>
      </div>
    </div>
    <div style="grid-column:3;grid-row:1;display:flex;flex-direction:column;align-items:flex-end;justify-content:center">
      <div style="font-size:22px;border:2.5px solid #333;border-radius:10px;padding:10px 14px;font-family:'Noto Sans SC',sans-serif">
        📋 法务合规 <span style="color:var(--primary);font-size:28px">✅</span>
      </div>
    </div>
    <div style="grid-column:3;grid-row:2;display:flex;align-items:center">
      <div style="width:100%;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:12px;padding:14px 16px;color:white;text-align:center;font-family:'Noto Sans SC',sans-serif">
        <div style="font-size:13px;opacity:0.85">📊 调研数据</div>
        <div style="font-weight:bold;font-size:20px">—</div>
      </div>
    </div>
    <div style="grid-column:1;grid-row:2/4;display:flex;flex-direction:column;justify-content:center" id="wb-points"></div>
    <div style="grid-column:2;grid-row:3;display:flex;align-items:center;justify-content:space-between;position:relative">
      <div style="position:absolute;top:18px;left:30px;right:30px;height:3px;background:#ddd;z-index:0"></div>
      <div style="display:flex;flex-direction:column;align-items:center;position:relative;z-index:1"><span style="font-size:22px;margin-bottom:4px">🗓️</span><span style="font-size:13px;color:#666;font-family:sans-serif">—</span><span style="font-size:15px;text-align:center;font-family:'Noto Sans SC',sans-serif">—</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;position:relative;z-index:1"><span style="font-size:22px;margin-bottom:4px">🚀</span><span style="font-size:13px;color:#666;font-family:sans-serif">—</span><span style="font-size:15px;text-align:center;font-family:'Noto Sans SC',sans-serif">—</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;position:relative;z-index:1"><span style="font-size:22px;margin-bottom:4px">🎯</span><span style="font-size:13px;color:#666;font-family:sans-serif">—</span><span style="font-size:15px;text-align:center;font-family:'Noto Sans SC',sans-serif">—</span></div>
    </div>
    <div style="grid-column:3;grid-row:3;display:flex;align-items:flex-end;justify-content:center">
      <div style="width:100%;background:#fff;border:3.5px solid #111;border-radius:16px 16px 4px 4px;padding:12px 16px;box-shadow:4px 4px 0 #111;font-family:'Noto Sans SC',sans-serif">
        <div style="font-size:13px;color:var(--primary);font-weight:bold;margin-bottom:4px">💡 总结</div>
        <div style="font-size:22px">—</div>
      </div>
    </div>
  </div>

  <div class="tips">
    💡 <strong>提示：</strong>输入任意长度文字，AI 自动提取 3-4 个核心要点并生成精美的 9 宫格白板图片。<br>
    无需 API Key，图片直接在浏览器生成，可免费下载为 PNG。
  </div>

<script>
  var generatedDataUrl = null;
  var API_BASE = '';

  function setStatus(msg, isError) {
    document.getElementById('status').textContent = msg;
    document.getElementById('status').style.color = isError ? '#e74c3c' : '#e67e22';
  }

  async function processAndGenerate() {
    var text = document.getElementById('inputText').value.trim();
    if (!text) { setStatus('⚠️ 请先输入内容！', true); return; }

    var btn = document.getElementById('genBtn');
    btn.disabled = true;
    document.getElementById('result-preview').style.display = 'none';
    setStatus('🤖 AI 正在解析文本，提炼核心逻辑...');

    try {
      // 调用后端 API（API Key 完全隐藏在后端）
      var res = await fetch(API_BASE + '/api/visual-note', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text })
      });
      var result = await res.json();

      if (!result.success) throw new Error(result.error || '生成失败');

      var data = result.data;
      setStatus('🎨 正在排版与绘制...');

      // 填充 DOM
      document.getElementById('wb-title').textContent = data.title || '核心要点';
      document.getElementById('wb-subtitle').textContent = data.subtitle || '快速了解全局';

      // 要点列表
      var pointsEl = document.getElementById('wb-points');
      pointsEl.innerHTML = '';
      (data.points || []).forEach(function(p) {
        var div = document.createElement('div');
        div.className = 'wb-point';
        div.innerHTML = '<span class="wb-point-icon">' + (p.icon || '📌') + '</span><span class="wb-point-text">' + p.text + '</span>';
        pointsEl.appendChild(div);
      });

      // 等待字体加载
      await new Promise(r => setTimeout(r, 800));

      setStatus('📸 正在生成图片...');

      // html2canvas 截图
      var wb = document.getElementById('whiteboard');
      wb.style.position = 'fixed';
      wb.style.top = '0';
      wb.style.left = '0';
      wb.style.zIndex = '-1';
      wb.classList.remove('hidden');

      var canvas = await html2canvas(wb, {
        scale: 2,
        backgroundColor: '#ffffff',
        useCORS: true,
        logging: false
      });

      wb.style.position = 'fixed';
      wb.style.top = '-9999px';
      wb.style.left = '-9999px';

      generatedDataUrl = canvas.toDataURL('image/png');
      document.getElementById('preview-img').src = generatedDataUrl;
      document.getElementById('result-preview').style.display = 'block';
      document.getElementById('dlBtn').disabled = false;
      setStatus('✨ 生成成功！点击「下载图片」保存到本地');

    } catch(err) {
      setStatus('❌ 失败: ' + err.message, true);
      console.error(err);
    } finally {
      btn.disabled = false;
    }
  }

  function downloadImg() {
    if (!generatedDataUrl) return;
    var a = document.createElement('a');
    a.href = generatedDataUrl;
    a.download = 'vision-note-' + Date.now() + '.png';
    a.click();
  }
</script>
</body>
</html>
