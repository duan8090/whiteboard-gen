<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🖌️ 白板绘图生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      max-width: 900px;
      width: 100%;
      padding: 40px 20px;
    }
    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 8px;
      color: #fff;
    }
    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }
    .input-card {
      background: #16213e;
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 24px;
      border: 1px solid #0f3460;
    }
    .input-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    input[type="text"] {
      flex: 1;
      min-width: 200px;
      padding: 14px 18px;
      border-radius: 10px;
      border: 1px solid #0f3460;
      background: #0a0a1a;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      border-color: #00d2ff;
    }
    button {
      padding: 14px 28px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #00d2ff, #3a7bd5);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .canvas-card {
      background: #16213e;
      border-radius: 16px;
      padding: 24px;
      border: 1px solid #0f3460;
      min-height: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .canvas-placeholder {
      color: #555;
      text-align: center;
    }
    .canvas-placeholder .icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }
    .canvas-placeholder p {
      font-size: 0.9rem;
    }
    .result-text {
      color: #00d2ff;
      margin-top: 12px;
      font-size: 0.85rem;
    }
    #outputImage {
      max-width: 100%;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: #888;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #0f3460;
      border-top-color: #00d2ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .tips {
      margin-top: 20px;
      padding: 16px;
      background: #0f3460;
      border-radius: 10px;
      font-size: 0.85rem;
      color: #aaa;
      line-height: 1.6;
    }
    .tips strong { color: #00d2ff; }
    .error-msg {
      color: #ff6b6b;
      margin-top: 10px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🖌️ 白板绘图生成器</h1>
    <p class="subtitle">输入文字，AI 为你生成白板风格插图</p>

    <div class="input-card">
      <div class="input-group">
        <input type="text" id="textInput" placeholder="例如：一只猫在弹吉他" onkeydown="if(event.key==='Enter')generate()" />
        <button id="genBtn" onclick="generate()">🎨 生成图片</button>
      </div>
    </div>

    <div class="canvas-card" id="canvasCard">
      <div class="canvas-placeholder" id="placeholder">
        <div class="icon">🎨</div>
        <p>输入文字后点击「生成图片」<br><span style="font-size:0.8rem;color:#555">AI 将为你创作白板风格插图</span></p>
      </div>
      <div class="loading" id="loadingUI" style="display:none">
        <div class="spinner"></div>
        <p>AI 创作中，请稍候...</p>
      </div>
      <img id="outputImage" style="display:none" />
      <p class="result-text" id="resultText" style="display:none"></p>
      <p class="error-msg" id="errorMsg" style="display:none"></p>
    </div>

    <div class="tips">
      💡 <strong>提示：</strong>描述越具体，生成效果越好。例如：<br>
      &nbsp;&nbsp;• "一个人在白板前讲解"<br>
      &nbsp;&nbsp;• "流程图：用户注册 → 登录 → 下单"<br>
      &nbsp;&nbsp;• "会议室里讨论项目的场景"
    </div>
  </div>

  <script>
    // 自动找出后端地址（服务器部署时用环境变量，本地开发用 localhost）
    const API_BASE = window.location.hostname === 'localhost' 
      ? 'http://localhost:3001' 
      : '';

    async function generate() {
      const text = document.getElementById('textInput').value.trim();
      if (!text) {
        showError('请先输入文字内容');
        return;
      }

      // UI 重置
      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('loadingUI').style.display = 'flex';
      document.getElementById('outputImage').style.display = 'none';
      document.getElementById('resultText').style.display = 'none';
      document.getElementById('errorMsg').style.display = 'none';
      document.getElementById('genBtn').disabled = true;

      try {
        const res = await fetch(`${API_BASE}/api/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById('loadingUI').style.display = 'none';
          document.getElementById('outputImage').src = `${API_BASE}${data.imageUrl}`;
          document.getElementById('outputImage').style.display = 'block';
          document.getElementById('resultText').textContent = `✨ 已生成: ${data.text}`;
          document.getElementById('resultText').style.display = 'block';
        } else {
          showError(data.error || '生成失败');
        }
      } catch (err) {
        showError('网络错误，请检查后端服务是否启动');
      } finally {
        document.getElementById('genBtn').disabled = false;
      }
    }

    function showError(msg) {
      document.getElementById('loadingUI').style.display = 'none';
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('errorMsg').style.display = 'block';
    }
  </script>
</body>
</html>
